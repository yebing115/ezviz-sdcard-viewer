<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萤石 SD 卡录像查看器</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1 data-i18n="appHeading">录像查看器</h1>
          <p id="summary">读取索引中...</p>
        </div>

        <label class="field">
          <span data-i18n="languageLabel">语言</span>
          <select id="languageSelect">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </label>

        <div class="directory-box">
          <span data-i18n="dataDirectory">数据目录</span>
          <strong id="directoryPath">未选择</strong>
          <button id="chooseDirectoryButton" type="button" data-i18n="chooseDirectory">选择目录</button>
        </div>

        <label class="field">
          <span data-i18n="dateLabel">日期</span>
          <select id="dateSelect"></select>
        </label>

        <div class="stats">
          <div>
            <span data-i18n="indexLabel">索引</span>
            <strong id="indexSource">-</strong>
          </div>
          <div>
            <span data-i18n="playableSegments">可播放分片</span>
            <strong id="playableCount">-</strong>
          </div>
          <div>
            <span data-i18n="dayCount">日期数量</span>
            <strong id="dayCount">-</strong>
          </div>
        </div>

        <div class="segments" id="segments"></div>
      </aside>

      <section class="viewer">
        <header class="toolbar">
          <div>
            <h2 id="currentTitle">选择一个时间段</h2>
            <p id="currentMeta">按日期筛选后点击左侧时间段播放。</p>
          </div>
          <button id="refreshButton" type="button" title="重新读取 bin 索引" data-i18n="refresh" data-i18n-title="refreshTitle">刷新</button>
        </header>

        <div class="video-wrap">
          <video id="player" controls autoplay muted playsinline></video>
        </div>

        <div class="play-controls">
          <label class="field">
            <span data-i18n="segmentOffset">片段内时间</span>
            <input id="offsetRange" type="range" min="0" max="0" value="0" step="1" disabled>
          </label>
          <div class="offset-row">
            <span id="offsetLabel">00:00:00</span>
            <button id="playOffsetButton" type="button" disabled data-i18n="playFromHere">从此处播放</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
